<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1</title>
    <style>
        h1{
            text-align: center;
        }
        table{
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border: 2px solid #000;
            padding: 20px;
        }
        td{
            padding: 10px 0px;
        }
        input[type="submit"]{
            background-color: rgb(20, 142, 255);
            padding: 10px 15px;
            color: white;
            border: none;
            cursor: pointer;
        }
        .col1{
            width: 20%;
        }
    </style>
</head>

<!--Code written by Aaron-->

<body>
    <h1>Contact Details</h1>
    <form action="*" method="get">
        <table>
            <tr>
                <td colspan="2">
                    Please enter your personal details:
                </td>
            </tr>
            <tr>
                <td class="col1">
                    <label for="fname">First Name: *</label>
                </td>
                <td>
                    <input type="text" id="fname" name="fname" required>
                </td>
            </tr>
            <tr>
                <td class="col1">
                    <label for="lname">Last Name: *</label>
                </td>
                <td>
                    <input type="text" id="lname" name="lname" required>
                </td>
            </tr>
            <tr>
                <td class="col1">
                    <label for="address">Street Address:</label>
                </td>
                <td>
                    <input type="text" id="address" name="address" style="padding-right: 140px;">
                </td>
            </tr>
            <tr>
                <td class="col1">
                    <label for="town">Town/City:</label>
                </td>
                <td>
                    <input type="text" id="town" name="town">
                </td>
            </tr>
            <tr>
                <td class="col1">
                    <label for="postcode">Postcode/Zip:</label>
                </td>
                <td>
                    <input type="text" id="postcode" name="postcode">
                </td>
            </tr>
            <tr>
                <td class="col1">
                    <label for="telephone">Telephone:</label>
                </td>
                <td>
                    <input type="text" id="telephone" name="telephone">
                </td>
            </tr>
            <tr>
                <td class="col1">
                    <label for="mobile">Mobile:</label>
                </td>
                <td>
                    <input type="text" id="mobile" name="mobile">
                </td>
            </tr>
            <tr>
                <td class="col1">
                    <label for="email">Email Address:</label>
                </td>
                <td>
                    <input type="email" id="email" name="email" style="padding-right: 140px;">
                </td>
            </tr>
            <tr>
                <td style="font-weight: 600; text-align: center;" colspan="2">
                    Fields marked * are required.
                </td>    
            </tr>
            <tr>
                <td style="text-align: center;" colspan="2">
                    <input type="submit" value="Submit">
                </td>    
            </tr>
            <tr>
                <td style="text-align: right; color: gray; font-weight: lighter;" colspan="2">
                    <cite>Written by Aaron(Batch-2025)</cite>
                </td>    
            </tr>
        </table>
    </form>
</body>

<!--Code written by Aaron-->

</html>
