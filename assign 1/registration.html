<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        h1 {
            text-align: center;
        }
        table{
            margin: 0 auto;
            width: 100%;
            max-width: 800px;
            border: 1px solid #000;
        }
        td{
            border: 1px solid #000;
            padding: 5px;
        }
    </style>
</head>

<!--Code written by Aaron-->

<body>
<table>
    <colgroup>
        <col style="width: 40%;">
        <col style="width: 60%;">
    </colgroup>
    <tr>
        <td colspan="2"><h1>Registration Form</h1></td>
    </tr>
    <tr>
        <td><label for="name">Student Name:</label></td>
        <td><input type="text" id="name" name="name"></td>
    </tr>
    <tr>
        <td><label for="father-name">Father's Name:</label></td>
        <td><input type="text" id="father-name" name="father-name"></td>
    </tr>
    <tr>
        <td><label for="mother-name">Mother's Name:</label></td>
        <td><input type="text" id="mother-name" name="mother-name"></td>
    </tr>
    <tr>
        <td><label for="dob">Date of Birth:</label></td>
        <td><input type="date" id="dob" name="dob   "></td>
    </tr>
    <tr>
        <td><label for="gender">Gender:</label></td>
        <td>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="female">Female</label>
            <input type="radio" id="female" name="gender" value="female">
        </td>
    </tr>
    <tr>
        <td><label for="email">Email ID:</label></td>
        <td><input type="email" id="email" name="email  "></td>
    </tr>
    <tr>
        <td><label for="mobile">Mobile No:</label></td>
        <td><input type="number" id="mobile" name="mobile  "></td>
    </tr>
    <tr>
        <td><label for="address">Address:</label></td>
        <td><textarea id="address" name="address" rows="5" cols="40"></textarea></td>
    </tr>
    <tr>
        <td><label for="state">State:</label></td>
        <td><input type="text" id="state" name="state     "></td>
    </tr>
    <tr>
        <td><label for="city">City:</label></td>
        <td><input type="text" id="city" name="city      "></td>
    </tr>
    <tr>
        <td></td>
        <td><input type="submit" value="Submit" style="border-radius: 2px; padding: 5px 10px; background-color: #02b3ff; color: white; cursor: pointer;"></td>
    </tr>
    <tr>
        <td style="text-align: right; color: gray; font-weight: lighter;" colspan="2">
            <cite>Written by Aaron(Batch-2025)</cite>
        </td>    
    </tr>
</table>
</body>

<!--Code written by Aaron-->

</html>
