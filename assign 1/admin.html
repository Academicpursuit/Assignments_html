<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        table{
            margin: 0 auto;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<!--Code written by Aaron-->

<body>
    <form action="!" method="get">
        <table>
        <tr>
            <td colspan="2"><h1>Admin Login Page</h1></td>
        </tr>
        <tr>
            <td>
                <label for="username">Username: </label>
            </td>
            <td>
                <input type="text" id="username" name="username">
            </td>
        </tr>
        <tr>
            <td>
                <label for="password">Password: </label>
            </td>
            <td>
                <input type="password" id="password" name="password">
            </td>
        </tr>
        <tr>
            <td>
                <input type="submit" value="Login" style="cursor: pointer; background-color: rgb(20, 142, 255); color: white; border: none; padding: 5px 10px">
                <input type="reset" value="Reset" style=" cursor: pointer; background-color: rgb(20, 142, 255); color: white; border: none; padding: 5px 10px">
            </td>
        </tr>
        <tr>
            <td style="text-align: right; color: gray; font-weight: lighter;" colspan="2">
                <cite>Written by Aaron(Batch-2025)</cite>
            </td>    
        </tr>
        </table>
    </form>
</body>

<!--Code written by Aaron-->

</html>
